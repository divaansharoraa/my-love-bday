<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday My Love</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: url("file:///C:/Users/Divansh/Downloads/1.jpeg") no-repeat center center fixed;
      background-size: cover;
      overflow-x: hidden;
      color: white;
      text-align: center;
    }

    /* floating hearts */
    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.8);
      transform: rotate(45deg);
      animation: floatUp 6s infinite ease-in;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
    }

    .heart::before { top: -10px; left: 0; }
    .heart::after { top: 0; left: 10px; }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1) rotate(45deg); opacity: 1; }
      to { transform: translateY(-800px) scale(1.5) rotate(45deg); opacity: 0; }
    }

    /* CENTER CONTENT */
    .container {
      position: relative;
      z-index: 10;
      padding: 40px 20px;
      max-width: 800px;
      margin: auto;
      background: rgba(0,0,0,0.35);
      border-radius: 20px;
    }

    h1 { font-size: 3rem; margin-bottom: 10px; }
    h2 { font-size: 1.5rem; margin-bottom: 30px; }

    .para-box {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      margin: 20px auto;
      border-radius: 20px;
      max-width: 600px;
      backdrop-filter: blur(6px);
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .footer-msg {
      margin-top: 30px;
      font-size: 1.3rem;
      font-weight: bold;
    }

    /* SIDE IMAGES */
    .side-gallery {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 5;
    }

    .side-gallery.left { left: 10px; }
    .side-gallery.right { right: 10px; }

    .side-gallery img {
      width: 120px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    @media (max-width: 768px) {
      .side-gallery { display: none; }
    }
  </style>
</head>

<body>

  <div class="hearts" id="hearts"></div>

  <!-- LEFT SIDE PICS -->
  <div class="side-gallery left">
    <img src="file:///C:/Users/Divansh/Downloads/2.jpeg">
    <img src="file:///C:/Users/Divansh/Downloads/3.jpeg">
  </div>

  <!-- RIGHT SIDE PICS -->
  <div class="side-gallery right">
    <img src="file:///C:/Users/Divansh/Downloads/4.jpeg">
    <img src="file:///C:/Users/Divansh/Downloads/5.jpeg">
  </div>

  <!-- CENTER CONTENT -->
  <div class="container">
    <h1>Happy Birthday My Love ❤️</h1>
    <h2>my baby princessssssssssss!</h2>

    <div class="para-box">
      <p>Paragraph 1 yahan apna message likh ❤️</p>
    </div>

    <div class="para-box">
      <p>Paragraph 2 yahan likh 💫</p>
    </div>

    <div class="para-box">
      <p>Paragraph 3 yahan likh 💖</p>
    </div>

    <p class="footer-msg">Forever yours my princesssss ❤️</p>
  </div>

  <script>
    function createHearts() {
      const heartsContainer = document.getElementById('hearts');
      setInterval(() => {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
        heartsContainer.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
      }, 300);
    }
    createHearts();
  </script>

</body>
</html>
