<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday My Love</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow-x: hidden;
      color: white;
      text-align: center;
    }

    .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.8);
      transform: rotate(45deg);
      animation: floatUp 6s infinite ease-in;
    }

    .heart:before,
    .heart:after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
    }

    .heart:before {
      top: -10px;
      left: 0;
    }

    .heart:after {
      left: 10px;
      top: 0;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-800px) scale(1.5);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 10;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.5rem;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .para-box {
      background: rgba(255, 255, 255, 0.15);
      padding: 20px;
      margin: 20px auto;
      border-radius: 20px;
      max-width: 600px;
      backdrop-filter: blur(6px);
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .footer-msg {
      margin-top: 30px;
      font-size: 1.3rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="container">
    <h1>Happy Birthday My Love ❤️</h1>
    <h2>my baby princessssssssssss!</h2>

    <div class="para-box">
      <p><b>Paragraph 1:</b> idhr likhioo andheeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee </p>
    </div>

    <div class="para-box">
      <p><b>Paragraph 2:</b> idhrrrrrrrrrrrr likhiooooooo andheeeeeeeeeeeeeeeeeee </p>
    </div>

    <div class="para-box">
      <p><b>Paragraph 3:</b> idhrrrrrrrrr likhiooooooooooooooooooooooo  ❤️</p>
    </div>

    <p class="footer-msg">ending idhr deni h bsdk</p>
  </div>

  <script>
    function createHearts() {
      const heartsContainer = document.getElementById('hearts');
      setInterval(() => {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
        heartsContainer.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
      }, 300);
    }
    createHearts();
  </script>

</body>
</html>
